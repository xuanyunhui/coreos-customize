name: 自动更新基础镜像 Tag

on:
  schedule:
    - cron: '0 0 * * 1'  # 每周一 UTC 00:00
  workflow_dispatch:       # 支持手动触发

concurrency:
  group: update-base-image
  cancel-in-progress: true

jobs:
  update:
    name: 检测并更新基础镜像
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取最新支持 arm64 的 tag
        id: get_tag
        run: |
          LATEST=$(skopeo list-tags docker://quay.io/fedora/fedora-coreos | \
            python3 -c "
          import json, sys, re, subprocess
          tags = json.load(sys.stdin)['Tags']
          pattern = re.compile(r'^44\.\d+\.\d+\.\d+$')
          candidates = sorted(
              [t for t in tags if pattern.match(t)],
              key=lambda t: [int(x) for x in t.split('.')],
              reverse=True
          )
          for tag in candidates:
              r = subprocess.run(
                  ['skopeo', 'inspect', '--override-arch', 'arm64',
                   f'docker://quay.io/fedora/fedora-coreos:{tag}'],
                  capture_output=True
              )
              if r.returncode == 0:
                  print(tag)
                  sys.exit(0)
          raise SystemExit('ERROR: No F44 arm64-compatible tag found')
          ")
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: 获取当前 Dockerfile tag
        id: current_tag
        run: |
          CURRENT=$(grep -oP 'fedora-coreos:\K\S+' Dockerfile)
          if [[ -z "$CURRENT" ]]; then
            echo "ERROR: 无法从 Dockerfile 提取当前 tag，请检查 FROM 行格式" >&2
            exit 1
          fi
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"

      - name: 比较版本并更新
        if: steps.get_tag.outputs.latest != steps.current_tag.outputs.current
        env:
          CURRENT: ${{ steps.current_tag.outputs.current }}
          LATEST: ${{ steps.get_tag.outputs.latest }}
        run: |
          echo "发现新版本: ${CURRENT} → ${LATEST}"
          sed -i "s|fedora-coreos:${CURRENT}|fedora-coreos:${LATEST}|" Dockerfile

      - name: 提交更改
        if: steps.get_tag.outputs.latest != steps.current_tag.outputs.current
        env:
          LATEST: ${{ steps.get_tag.outputs.latest }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "Update base image to fedora-coreos:${LATEST}"
          git push

      - name: 无更新报告
        if: steps.get_tag.outputs.latest == steps.current_tag.outputs.current
        env:
          CURRENT: ${{ steps.current_tag.outputs.current }}
        run: echo "当前已是最新版本 ${CURRENT}，无需更新。"
